name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies
        run: pnpm install

      - name: Generate ChangeLog
        id: changelog
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -z "$PREV_TAG" ]; then
              git log --oneline -n 20 > CHANGELOG.txt
            else
              git log $PREV_TAG..HEAD --oneline > CHANGELOG.txt
            fi
          else
            git log --oneline -n 10 > CHANGELOG.txt
          fi
          # Using GITHUB_OUTPUT for multi-line step output
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          releaseName: ${{ github.ref_type == 'tag' && github.ref_name || 'CodeVisualVerse Nightly' }}
          releaseBody: |
            ## 🌌 ChangeLog / 更新日志
            ${{ steps.changelog.outputs.content }}
            
            ---
            *Built automatically by GitHub Actions.*
          releaseDraft: ${{ github.ref_type == 'tag' }}
          prerelease: ${{ github.ref_type != 'tag' }}
          args: ${{ matrix.args }}
